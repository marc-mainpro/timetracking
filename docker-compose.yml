services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timetracking}
      POSTGRES_USER: ${POSTGRES_USER:-timetracking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timetracking} -d ${POSTGRES_DB:-timetracking}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-timetracking}
      DB_USER: ${POSTGRES_USER:-timetracking}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
