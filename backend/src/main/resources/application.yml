spring:
  application:
    name: timetracking
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

auth:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl: PT15M
  refresh-token:
    ttl: P14D
    cookie-name: refresh_token
    cookie-path: /api/v1/auth

security:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:4200}
