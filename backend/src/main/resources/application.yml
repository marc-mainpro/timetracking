spring:
  application:
    name: timetracking
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: never

outbox:
  poll-interval: PT5S
  batch-size: 50
  max-attempts: 8
  claim-timeout: PT5M
  archive-retention: P30D
  archive-cron: "0 0 3 * * *"
  scheduler-enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

auth:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl: PT15M
  rate-limit:
    capacity: 10
    window: PT1M
  refresh-token:
    ttl: P14D
    cookie-name: refresh_token
    cookie-path: /api/v1/auth

security:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:4200}
