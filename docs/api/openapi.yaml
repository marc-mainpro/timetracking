components:
  schemas:
    UpdateEmployeeRequest:
      type: "object"
      properties:
        firstName:
          type: "string"
          minLength: 1
        lastName:
          type: "string"
          minLength: 1
    EmployeeResponse:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        email:
          type: "string"
        firstName:
          type: "string"
        lastName:
          type: "string"
        status:
          type: "string"
        roles:
          type: "array"
          items:
            type: "string"
          uniqueItems: true
        createdAt:
          type: "string"
          format: "date-time"
        updatedAt:
          type: "string"
          format: "date-time"
    AssignRolesRequest:
      type: "object"
      properties:
        roles:
          type: "array"
          items:
            type: "string"
          minItems: 1
          uniqueItems: true
    CorrectionRequestDto:
      type: "object"
      properties:
        reason:
          type: "string"
          maxLength: 500
          minLength: 0
        proposedChanges:
          $ref: "#/components/schemas/ProposedChangesDto"
      required:
        - "proposedChanges"
    ProposedBreakDto:
      type: "object"
      properties:
        startedAt:
          type: "string"
          format: "date-time"
        endedAt:
          type: "string"
          format: "date-time"
      required:
        - "endedAt"
        - "startedAt"
    ProposedChangesDto:
      type: "object"
      properties:
        startedAt:
          type: "string"
          format: "date-time"
        endedAt:
          type: "string"
          format: "date-time"
        breaks:
          type: "array"
          items:
            $ref: "#/components/schemas/ProposedBreakDto"
          maxItems: 24
          minItems: 0
      required:
        - "breaks"
        - "endedAt"
        - "startedAt"
    CorrectionResponse:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        workdayId:
          type: "string"
          format: "uuid"
        requestedBy:
          type: "string"
          format: "uuid"
        reason:
          type: "string"
        proposedChanges:
          $ref: "#/components/schemas/ProposedChangesResponse"
        status:
          type: "string"
        resolvedBy:
          type: "string"
          format: "uuid"
        resolvedAt:
          type: "string"
          format: "date-time"
        resolutionComment:
          type: "string"
        createdAt:
          type: "string"
          format: "date-time"
    ProposedBreakResponse:
      type: "object"
      properties:
        startedAt:
          type: "string"
          format: "date-time"
        endedAt:
          type: "string"
          format: "date-time"
    ProposedChangesResponse:
      type: "object"
      properties:
        startedAt:
          type: "string"
          format: "date-time"
        endedAt:
          type: "string"
          format: "date-time"
        breaks:
          type: "array"
          items:
            $ref: "#/components/schemas/ProposedBreakResponse"
    BreakEntryResponse:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        startedAt:
          type: "string"
          format: "date-time"
        endedAt:
          type: "string"
          format: "date-time"
    WorkdayResponse:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        status:
          type: "string"
        startedAt:
          type: "string"
          format: "date-time"
        endedAt:
          type: "string"
          format: "date-time"
        breaks:
          type: "array"
          items:
            $ref: "#/components/schemas/BreakEntryResponse"
        workedDuration:
          type: "string"
          example: "PT2H30M"
    CreateEmployeeRequest:
      type: "object"
      properties:
        email:
          type: "string"
          minLength: 1
        password:
          type: "string"
          maxLength: 2147483647
          minLength: 10
        firstName:
          type: "string"
          minLength: 1
        lastName:
          type: "string"
          minLength: 1
        roles:
          type: "array"
          items:
            type: "string"
          minItems: 1
          uniqueItems: true
    CorrectionRejectRequest:
      type: "object"
      properties:
        resolutionComment:
          type: "string"
          maxLength: 500
          minLength: 0
    CorrectionResolutionRequest:
      type: "object"
      properties:
        resolutionComment:
          type: "string"
          maxLength: 500
          minLength: 0
    RegisterTenantRequest:
