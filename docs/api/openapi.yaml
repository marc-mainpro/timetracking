        tenantName:
          type: "string"
          minLength: 1
        timezone:
          type: "string"
          minLength: 1
        adminEmail:
          type: "string"
          minLength: 1
        adminPassword:
          type: "string"
          maxLength: 2147483647
          minLength: 10
        firstName:
          type: "string"
          minLength: 1
        lastName:
          type: "string"
          minLength: 1
    RegisterTenantResponse:
